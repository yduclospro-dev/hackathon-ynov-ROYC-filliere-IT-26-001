<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp Industries - Assistant Financier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="logo-area">
                <span class="logo-icon">🛡️</span>
                <h2>TechCorp <span class="accent-text">IA</span></h2>
            </div>
            
            <div class="chat-history-sidebar">
                <button id="btn-new-chat" class="btn-new-chat">+ Nouvelle discussion</button>
                <div class="history-list" id="history-list">
                    <!-- Dynamic chat list will be loaded here -->
                </div>
            </div>
            <div class="server-config">
                <div class="input-group">
                    <label for="api-url">Adresse Serveur</label>
                    <input type="text" id="api-url" value="https://lives-consciousness-jerusalem-respond.trycloudflare.com" placeholder="https://...trycloudflare.com">
                </div>
            </div>
            <div class="sidebar-footer">
                <p>Hamza Corp - Cyber Audit Edition</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <!-- Header -->
            <header class="chat-header">
                <div class="model-info">
                    <h3>Assistant Financier</h3>
                    <span class="model-badge">Phi-3.5 Financial (Quantisé)</span>
                </div>
                <div class="status-indicator" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Vérification de la connexion...</span>
                </div>
            </header>

            <!-- Chat Messages Container -->
            <section class="messages-container" id="chat-messages">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Bonjour ! Je suis l'assistant financier de TechCorp Industries. Comment puis-je vous aider dans vos analyses, budgets ou prévisions aujourd'hui ? 💰</p>
                    </div>
                    <span class="message-time">À l'instant</span>
                </div>
            </section>

            <!-- Input Area -->
            <footer class="chat-input-area">
                <form id="chat-form" class="input-form">
                    <input type="text" id="user-input" placeholder="Posez votre question financière ici..." required autocomplete="off">
                    <button type="submit" id="btn-send" class="btn-send">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dz6n"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
