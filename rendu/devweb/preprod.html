<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechCorp Industries - Console de Préproduction</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Cyber Warning specific styles for preprod warning theme */
        body.mode-corrupted {
            --accent: #ff3b30;
            --accent-light: #ffe5e5;
            --bubble-user: #ff3b30;
        }
        
        .badge-preprod {
            background-color: #ff9500;
            color: white;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .cyber-alert-box {
            background-color: #ffe5e5;
            border: 1px solid #ff3b30;
            border-radius: 12px;
            padding: 14px;
            margin: 10px 0;
            color: #d70015;
            font-family: monospace;
            font-size: 12px;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { border-color: #ff3b30; }
            50% { border-color: rgba(255, 59, 48, 0.3); }
            100% { border-color: #ff3b30; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-area">
                    <span class="logo-icon">⚙️</span>
                    <h2>TechCorp <span class="badge-preprod">Preprod</span></h2>
                </div>
                <div id="connection-status" class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Vérification...</span>
                </div>
            </div>
            
            <div class="history-section">
                <div class="section-header">
                    <h3>Discussions</h3>
                    <button id="btn-new-chat" class="btn-icon" title="Nouvelle discussion">+</button>
                </div>
                <div id="history-list" class="history-list">
                    <!-- Dynamic chat list will be loaded here -->
                </div>
            </div>

            <!-- Model Switcher including Corrupted model for demo purposes -->
            <div class="model-selector-segmented">
                <button class="segment-btn active" data-model="mistral">
                    <span class="icon">🩺</span>
                    <div class="btn-text">
                        <span class="label">Médical (R&D)</span>
                        <span class="sub-label">Mistral 7B</span>
                    </div>
                </button>
                <button class="segment-btn" data-model="phi3_corrupted">
                    <span class="icon">⚠️</span>
                    <div class="btn-text">
                        <span class="label">Financier (Legacy)</span>
                        <span class="sub-label">Phi-3.5 v1.0 (Audit)</span>
                    </div>
                </button>
            </div>
            
            <div class="server-config">
                <div class="input-group">
                    <label for="api-url">Adresse Serveur</label>
                    <input type="text" id="api-url" value="https://lives-consciousness-jerusalem-respond.trycloudflare.com" placeholder="https://...trycloudflare.com">
                </div>
            </div>
            
            <div class="sidebar-footer">
                <p>Hamza Corp - Cyber Demo Edition</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="model-info">
                    <h3>Console de Test</h3>
                    <span class="model-badge">Sélectionnez un modèle</span>
                </div>
            </header>

            <!-- Chat Messages Container -->
            <section class="messages-container" id="chat-messages">
                <!-- Messages will be appended here dynamically -->
            </section>

            <!-- Input Area -->
            <footer class="chat-input-area">
                <form id="chat-form" class="input-form">
                    <input type="text" id="user-input" placeholder="Saisissez votre question..." required autocomplete="off">
                    <button type="submit" id="btn-send" class="btn-send">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dz6n"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <script src="preprod.js"></script>
</body>
</html>
